name: Test Workflow
on:
  workflow_dispatch:
    inputs:
      test_input:
        description: 'Test input'
        required: true
        type: string
      another_input:
        description: 'Another input'
        required: false
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Echo input
        run: echo "Input was ${{ github.event.inputs.test_input }}"
